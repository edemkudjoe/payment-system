<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Payment System</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="page-center">
    <div class="card" style="width: 100%; max-width: 420px;">
      <h1 style="font-size: 1.4rem; margin-bottom: 0.25rem;">Event Payment</h1>
      <p class="text-muted" style="margin-bottom: 1.5rem;">Sign in to continue</p>

      <div id="alert" class="alert alert-error"></div>

      <div class="form-group">
        <label for="event_code">Event Code</label>
        <input type="text" id="event_code" placeholder="e.g. FEST2025" autocomplete="off" />
      </div>
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Your username" autocomplete="off" />
      </div>
      <div class="form-group">
        <label for="pin">PIN</label>
        <input type="password" id="pin" placeholder="••••" maxlength="6" />
      </div>

      <button class="btn btn-primary" id="loginBtn">Sign In</button>
    </div>
  </div>

  <script type="module">
    import { saveSession, showAlert, getSession } from '/js/auth.js';

    // Redirect if already logged in
    const { token, staff } = getSession();
    if (token && staff) {
      redirectByRole(staff.role);
    }

    document.getElementById('loginBtn').addEventListener('click', async () => {
      const event_code = document.getElementById('event_code').value.trim();
      const username = document.getElementById('username').value.trim();
      const pin = document.getElementById('pin').value.trim();

      if (!event_code || !username || !pin) {
        return showAlert('alert', 'All fields are required.');
      }

      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      const res = await fetch('/api/staff/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ event_code, username, pin })
      });

      const data = await res.json();
      btn.disabled = false;
      btn.textContent = 'Sign In';

      if (!res.ok) {
        return showAlert('alert', data.error || 'Login failed.');
      }

      saveSession(data.token, data.staff, data.event_id);
      redirectByRole(data.staff.role);
    });

    function redirectByRole(role) {
      const routes = {
        admin: '/admin.html',
        manager: '/admin.html',
        cashier: '/cashier.html'
      };
      window.location.href = routes[role] || '/index.html';
    }
  </script>
</body>
</html>
