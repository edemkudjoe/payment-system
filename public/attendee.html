<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Check Balance — Event Payment</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <nav class="navbar">
    <span class="navbar-brand">Event Payment</span>
  </nav>

  <div class="container" style="padding-top: 1.5rem; padding-bottom: 2rem;">
    <div class="card" style="max-width: 420px; margin: 0 auto;">
      <div class="card-title">Check Your Balance</div>
      <p class="text-muted" style="margin-bottom: 1.25rem; font-size: 0.875rem;">
        Enter the ID printed on your event card to check your token balance.
      </p>

      <div id="lookupAlert" class="alert alert-error"></div>

      <div class="form-group">
        <label>Card ID</label>
        <input
          type="text"
          id="qrCodeId"
          placeholder="Enter your card ID"
          autocomplete="off"
        />
      </div>

      <button class="btn btn-primary" id="checkBtn">Check Balance</button>

      <!-- Result -->
      <div id="balanceResult" style="display:none; margin-top: 1.5rem;">
        <hr class="divider" />
        <div style="text-align: center; padding: 1rem 0;">
          <div class="text-muted" style="font-size: 0.8rem; margin-bottom: 0.25rem;">
            Token Balance
          </div>
          <div style="font-size: 3rem; font-weight: 700; color: var(--primary);" id="balanceDisplay">
            ₵0
          </div>
          <div style="font-weight: 500; margin-top: 0.5rem;" id="attendeeNameDisplay"></div>
          <div class="text-muted" style="font-size: 0.8rem; margin-top: 0.25rem;">
            1 token = GH₵1
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/js/attendee.js"></script>
</body>
</html>
